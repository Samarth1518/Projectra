services:
  - type: web
    name: projectra-ai-backend
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --workers 1 --threads 8 --worker-class gthread --timeout 120 app:app
    envVars:
      - key: GEMINI_API_KEYS
        sync: false
      - key: GEMINI_API_KEY
        sync: false
